# Русский перевод — полная локализация
# Технические названия (Claude, Obsidian, Whisper, SRS) остаются на английском.
# Команды бота (/start, /help и т.д.) не переводятся — это системные идентификаторы.

commands:
  start:
    welcome: |
      <b>Персональный захват знаний</b>

      Мост между мимолётными мыслями и вашей системой знаний.

      <b>Что я обрабатываю:</b>

      <b>Ссылки</b> — Отправьте любой URL. Я извлеку содержимое, выделю главное и сохраню в ваше хранилище Obsidian. Умная маршрутизация учитывает ваши предпочтения.

      <b>Изображения</b> — Фотографии анализируются и классифицируются (скриншот, чек, документ, диаграмма, фото). Каждый тип направляется в нужную папку. Чеки — в расходы, диаграммы — в исследования.

      <b>Голос</b> — Говорите свои мысли. Я транскрибирую через Whisper, определю намерение (задача, заметка, мысль) и добавлю в ваши ежедневные заметки или входящие.

      <b>Текст</b> — Добавьте префикс <code>inbox:</code>, <code>research:</code> или <code>task:</code> для прямой маршрутизации.

      Всё попадает в ваше хранилище Obsidian. Система учится на ваших правках.

      <i>Отправьте что-нибудь, чтобы начать.</i>
    init_error: "Произошла ошибка при инициализации сессии. Попробуйте ещё раз."

  help:
    full_text: |
      <b>📖 Команды</b>

      <b>Основные:</b>
      <code>/start</code> — Приветственное сообщение
      <code>/help</code> — Эта справка
      <code>/menu</code> — Меню команд по категориям
      <code>/settings</code> — Настройки (голос, клавиатура, трекеры)
      <code>/language</code> — Сменить язык бота
      <code>/note имя</code> — Просмотр заметки из хранилища
      <code>/gallery</code> — Галерея загруженных изображений

      <b>Claude Code:</b>
      <code>/claude запрос</code> — Выполнить запрос
      <code>/claude:new</code> — Новая сессия
      <code>/claude:sessions</code> — Список сессий
      <code>/claude:lock</code> — Режим блокировки (всё → Claude)
      <code>/claude:unlock</code> — Снять блокировку
      <code>/claude:reset</code> — Сбросить сессию
      <code>/claude:help</code> — Справка Claude
      <code>/session</code> — Информация о сессии
      <code>/session rename</code> — Переименовать сессию
      <code>/meta запрос</code> — Работа над самим ботом

      <b>OpenCode:</b>
      <code>/opencode запрос</code> — Запрос (75+ LLM-провайдеров)
      <code>/opencode:new</code> — Новая сессия
      <code>/opencode:sessions</code> — Список сессий
      <code>/opencode:reset</code> — Сбросить сессию
      <code>/opencode:help</code> — Справка OpenCode

      <b>Codex:</b>
      <code>/codex запрос</code> — Анализ кода
      <code>/codex:resume</code> — Продолжить сессию
      <code>/codex:help</code> — Параметры Codex

      <b>Исследования и сбор:</b>
      <code>/research тема</code> — Глубокое исследование → хранилище
      <code>/research:help</code> — Параметры исследований
      <code>/collect:start</code> — Начать сбор элементов
      <code>/collect:go</code> — Обработать собранное
      <code>/collect:status</code> — Показать очередь
      <code>/collect:stop</code> — Отменить сбор

      <b>Обучение и повторение:</b>
      <code>/review</code> — Карточки SRS к повторению
      <code>/srs_stats</code> — Статистика интервального повторения
      <code>/trail</code> — Следующая тропа к повторению
      <code>/trail:list</code> — Все тропы к повторению

      <b>Привычки:</b>
      <code>/track</code> — Обзор трекеров за сегодня
      <code>/track:add [тип] имя</code> — Создать трекер
      <code>/track:done имя</code> — Отметить выполнение
      <code>/track:skip имя</code> — Пропустить сегодня
      <code>/track:list</code> — Все трекеры
      <code>/track:remove имя</code> — Архивировать трекер
      <code>/streak</code> — Панель серий

      <b>Опросы и отслеживание:</b>
      <code>/polls</code> — Статистика опросов
      <code>/polls:send</code> — Запустить следующий опрос
      <code>/polls:pause</code> / <code>resume</code> — Вкл/выкл авто-опросы

      <b>Приватность:</b>
      <code>/privacy</code> — Политика конфиденциальности
      <code>/mydata</code> — Экспорт ваших данных
      <code>/deletedata</code> — Удаление ваших данных

      <b>Память:</b>
      <code>/memory</code> — Просмотр памяти чата
      <code>/memory edit &lt;текст&gt;</code> — Заменить память
      <code>/memory add &lt;текст&gt;</code> — Дополнить память
      <code>/memory export</code> — Скачать CLAUDE.md
      <code>/memory reset</code> — Сброс к умолчанию

      <b>Задачи:</b>
      <code>/tasks</code> — Список задач по расписанию
      <code>/tasks pause &lt;id&gt;</code> — Приостановить задачу
      <code>/tasks resume &lt;id&gt;</code> — Возобновить задачу
      <code>/tasks history &lt;id&gt;</code> — Последние 5 запусков

      <b>Система:</b>
      <code>/heartbeat</code> — Проверка здоровья системы (админ)

      <b>Быстрые режимы:</b>
      <code>/analyze</code> <code>/coach</code> <code>/creative</code> <code>/quick</code>
      <code>/formal</code> <code>/tags</code> <code>/coco</code> <code>/mode</code>

      <b>Подсказки:</b>
      • Отправляйте изображения для AI-анализа
      • Голосовые заметки → транскрипция → Claude
      • Ссылки сохраняются в хранилище
      • Префикс <code>inbox:</code> или <code>task:</code> для маршрутизации текста
      • Ответьте на любое сообщение для продолжения контекста

