research:
  no_permission: "У вас нет прав для использования режима исследований."
  help_text: |
    <b>Режим исследований</b>

    <code>/research &lt;тема&gt;</code> — Глубокое исследование любой темы
    <code>/research:help</code> — Эта справка

    <b>Что происходит:</b>
    1. Claude планирует под-вопросы
    2. Ищет в интернете (WebSearch + WebFetch)
    3. Синтезирует результаты из разных источников
    4. Пишет отчёт с цитатами в хранилище
    5. Генерирует мобильный PDF
    6. Связывает с существующими заметками

    <b>Результат:</b> <code>~/Research/vault/Research/on-demand/</code>

    <b>Пример:</b>
    <code>/research Как AI-агенты используют инструменты?</code>

